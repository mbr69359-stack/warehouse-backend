name: Build & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build jar
        run: mvn clean package -DskipTests

      - name: Rename jar
        run: cp target/warehouse-backend-1.0.0.jar target/warehouse-backend.jar

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: deploy-${{ github.run_number }}
          name: "Deploy #${{ github.run_number }}"
          body: |
            Commit: ${{ github.sha }}
            Message: ${{ github.event.head_commit.message }}
          files: target/warehouse-backend.jar
          make_latest: true

      - name: Inject JWT_SECRET on VPS
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          VPS_PASSWORD: ${{ secrets.VPS_SSH_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass -q 2>/dev/null
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no root@139.84.247.83 \
            "SERVICE=/etc/systemd/system/warehouse.service
             if grep -q JWT_SECRET \$SERVICE; then
               sed -i \"s|Environment=\\\"JWT_SECRET=.*\\\"|Environment=\\\"JWT_SECRET=$JWT_SECRET\\\"|\" \$SERVICE
             else
               sed -i \"/\\[Service\\]/a Environment=\\\"JWT_SECRET=$JWT_SECRET\\\"\" \$SERVICE
             fi
             systemctl daemon-reload"